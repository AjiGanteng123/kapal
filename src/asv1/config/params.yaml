/node_kamera:
  ros__parameters:
    device_utama: ""
    device_bawah: ""
    device_samping: "0"
    fps_utama: 30
    fps_bawah: 10
    fps_samping: 10
    frame_width: 640
    frame_height: 480

/node_deteksi:
  ros__parameters:
    model_path: "/home/aji/robot_ws/finallll_detek.onnx"
    conf_threshold: 0.7
    mission_conf_threshold: 0.6
    required_frames: 5
    horizon_ratio: 0.33
    inference_interval_ms: 100
    capture_conf_threshold: 0.8
    capture_min_area: 2000
    capture_blur_threshold: 100.0
    capture_position_margin: 0.25

/node_lidar:
  ros__parameters:
    serial_port: "/dev/ttyUSB0"
    baudrate: 460800
    num_sectors: 4
    obstacle_distance: 0.5
    publish_scan: true
    frame_id: "laser_frame"
    csv_path: "/tmp/lidar_data.csv"
    csv_raw: true                    # NEW: Enable raw CSV recording (all 360° + sectors)
    las_output: true
    las_dir: "/tmp/lidar_las"

/node_navigasi:
  ros__parameters:
    waypoint_lat: -7.052600
    waypoint_lon: 110.434800
    cruise_speed: 0.5
    approach_speed: 0.35
    visual_p_gain: 1.0
    visual_i_gain: 0.00
    visual_d_gain: 0.5
    lpf_alpha: 0.50
    gps_p_gain: 1.0
    max_yaw_rate: 0.45
    obstacle_stop_dist: 0.4
    obstacle_avoid_speed: 0.3
    fusion_dist_min: 0.3
    fusion_dist_max: 3.0
    fusion_speed_min: 0.15
    fusion_speed_max: 0.6

/node_motor:
  ros__parameters:
    serial_port: "/dev/ttyACM0"
    baudrate: 115200
    protocol: "mavlink"
    max_linear: 0.5
    max_angular: 0.8
    auto_control: true

/node_misi:
  ros__parameters:
    firebase_key_path: "/home/aji/robot_ws/firebase-key.json"
    firebase_url: "https://asvmonitoringweb-default-rtdb.asia-southeast1.firebasedatabase.app/"
    firebase_ref: "/kapal/tim-asv-01"
    cloudinary_cloud: "ds2j86wki"
    cloudinary_key: "563889432822331"
    # cloudinary_secret: MOVED TO ENVIRONMENT VARIABLE (CLOUDINARY_SECRET)
    cloudinary_folder: "asv_lomba"
    capture_cooldown: 5.0

/bide_trainer:
  ros__parameters:
    output_path: "/tmp/training_data.csv"
    enable_recording: true          # NEW: Enable training data recording
